name: Run pytest (conda)

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # Set up environment
      # ------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: project_template_env
          environment-file: project_template_env.yml
          auto-activate: false
          use-mamba: true
          channel-priority: strict
          conda-remove-defaults: true

      # ------------------------------
      # Install own library
      # ------------------------------
      - name: Install our_library package
        shell: bash -l {0}
        run: |
          cd source
          pip install -e .

      # ------------------------------
      # Run ruff
      # ------------------------------
      - name: Run ruff (lint)
        shell: bash -l {0}
        run: ruff check .

      - name: Run ruff (check formatting)
        shell: bash -l {0}
        run: ruff format . --check

      # ------------------------------
      # Run tests
      # ------------------------------
      - name: Run pytest
        shell: bash -l {0}
        run: pytest .